<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design System — case study cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#374151; --muted:#6b7280; --line:#e5e7eb; --blue:#1977cd; --red:#dc3030;
  --surface:#fefefe; --canvas:#fefefe; --toast:#374151;
  /* easing taken from the reference animations */
  --e-out:cubic-bezier(.16,1,.3,1);      /* expo-out, smooth deceleration */
  --e-io:cubic-bezier(.76,0,.24,1);      /* emphasized in-out — cursor travel */
  --e-pop:cubic-bezier(.34,1.4,.5,1);    /* gentle overshoot */
  /* presence colours for the 3 people */
  --p1:#14AE5C; --p2:#7C5CFC; --p3:#EC4899;
}
html,body{height:100%}
body{font-family:'Inter',system-ui,sans-serif;background:#fefefe;
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 20px}

.frame{position:relative;width:100%;max-width:1180px;aspect-ratio:1280/840;border-radius:18px;overflow:hidden;
  box-shadow:0 1px 1px rgba(22,32,43,.05),0 14px 30px rgba(22,32,43,.10),0 44px 80px rgba(22,32,43,.12);
  background:var(--canvas)}
.scaler{position:absolute;top:0;left:0;width:1280px;height:840px;transform-origin:top left}
.camera{position:absolute;inset:0;transform-origin:0 0;transition:transform 1.2s var(--e-out);will-change:transform}
.drift{position:absolute;inset:0;will-change:transform}
@keyframes drift{0%{transform:translate(0,0)}25%{transform:translate(-9px,6px)}55%{transform:translate(7px,-5px)}80%{transform:translate(-4px,3px)}100%{transform:translate(0,0)}}
.app{position:absolute;inset:0;width:1280px;height:840px;background:var(--canvas);color:var(--ink)}


/* when embedded as a card cover (in an iframe), fill edge-to-edge */
html.embed,html.embed body{height:100%;width:100%}
html.embed body{padding:0;display:block;background:var(--canvas)}
html.embed .frame{width:100%;height:100%;max-width:none;aspect-ratio:auto;border-radius:0;box-shadow:none}
/* faint grid + glow so the empty canvas reads as a designed space */
.app::before{content:"";position:absolute;inset:0;
  background-image:radial-gradient(circle at 1px 1px,rgba(55,65,81,.05) 1px,transparent 0);
  background-size:34px 34px;mask-image:radial-gradient(120% 100% at 50% 45%,#000 35%,transparent 80%)}
.app::after{content:"";position:absolute;left:50%;top:48%;width:760px;height:760px;transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(25,119,205,.06),transparent 62%);pointer-events:none}

/* ===== component column ===== */
.board{position:absolute;left:50%;top:calc(50% - 16px);width:700px;display:flex;flex-direction:column;gap:64px;z-index:2;transform:translate(-50%,-50%) scale(0.82);transform-origin:center center}

/* generic */
.card{background:var(--surface);border:1.838px solid var(--line);border-radius:12px;width:100%}
.label{font-weight:500;font-size:25.737px;line-height:36.767px;color:var(--ink);white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis}

/* file uploader */
.file-row{display:flex;align-items:center;justify-content:space-between;gap:30px;padding:24px 36px 24px 30px}
.file-left{display:flex;align-items:center;gap:22px;flex:1;min-width:0}
.file-meta{display:flex;flex-direction:column;gap:2px;min-width:0}
.file-name{font-weight:500;font-size:24px;line-height:36.767px;color:var(--ink)}
.file-size{font-weight:400;font-size:20px;line-height:29.414px;color:var(--muted)}
.trash{width:27px;height:27px;flex:none;border-radius:8px;display:flex;align-items:center;justify-content:center;
  transition:background .2s var(--e-out),transform .2s var(--e-pop)}
.trash.hot{background:#fdecec;transform:scale(1.08)}
.trash.hot svg path{stroke:var(--red)}
.trash svg path{transition:stroke .2s var(--e-out)}

/* segmented control + radio + checkbox row */
.row{display:flex;align-items:center;justify-content:space-between;width:100%}
.seg{display:flex;align-items:center;gap:7.353px;width:367px}
.seg-item{display:flex;align-items:center;justify-content:center;gap:14.707px;padding:7.353px 24px 7.353px 14.707px;
  border-radius:11.03px;flex:1;background:transparent;box-shadow:0 0 0 rgba(0,0,0,0);
  transition:background .3s var(--e-out),box-shadow .3s var(--e-out)}
.seg-item.on{background:var(--surface);
  box-shadow:0 -1.621px 1.621px rgba(0,0,0,.04),0 1.621px 2.431px rgba(0,0,0,.08)}
.seg-item .chk{width:29.414px;height:29.414px;flex:none;display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(.6);transition:opacity .25s var(--e-out),transform .3s var(--e-pop)}
.seg-item.on .chk{opacity:1;transform:scale(1)}
.seg-item:not(.on){padding-left:14.707px;padding-right:14.707px}
.seg-item:not(.on) .chk{width:0;margin-left:-14.707px}

.controls{display:flex;align-items:center;gap:50px}
.tgl{display:flex;align-items:center;gap:14.707px}
.radio{width:32.121px;height:32.121px;flex:none;border-radius:999px;background:var(--blue);position:relative;
  transition:background .25s var(--e-out),box-shadow .25s var(--e-out)}
.radio .dot{position:absolute;inset:31.25%;background:var(--surface);border-radius:999px;
  transform:scale(1);transition:transform .25s var(--e-pop)}
.radio:not(.on){background:transparent;box-shadow:inset 0 0 0 2px #c8c8de}
.radio:not(.on) .dot{transform:scale(0)}
.cbox{width:32.121px;height:32.121px;flex:none;border-radius:6px;background:var(--blue);position:relative;
  transition:background .25s var(--e-out),box-shadow .25s var(--e-out)}
.cbox .ck{position:absolute;inset:0;opacity:1;transform:scale(1);transition:opacity .2s var(--e-out),transform .28s var(--e-pop)}
.cbox:not(.on){background:transparent;box-shadow:inset 0 0 0 2px #c8c8de}
.cbox:not(.on) .ck{opacity:0;transform:scale(.5)}
/* hover states for cursor interactions */
.cbox.hover{box-shadow:inset 0 0 0 2px var(--blue), 0 0 0 4px rgba(25,119,205,.15);}
.cbox.on.hover{box-shadow:0 0 0 4px rgba(25,119,205,.18);}
.tab.hover .label{color:var(--ink)}
.tab.hover{background:rgba(55,65,81,.07);border-radius:8px 8px 0 0}
.btn.red.hover{filter:brightness(1.08);box-shadow:0 0 0 3px rgba(220,48,48,.22)}

/* accordion */
.acc-head{display:flex;align-items:center;gap:22.06px;padding:24px 36px 24px 30px;cursor:default}
.acc-title{flex:1;font-weight:500;font-size:25.737px;line-height:36.767px;color:var(--ink)}
.acc-ico{width:29.414px;height:29.414px;flex:none;display:flex;align-items:center;justify-content:center;
  transition:transform .38s var(--e-io)}
.acc.open .acc-ico{transform:rotate(45deg)}
.acc-body{max-height:0;opacity:0;overflow:hidden;padding:0 30px;
  transition:max-height .42s var(--e-io),opacity .35s var(--e-out),padding .42s var(--e-io)}
.acc.open .acc-body{max-height:150px;opacity:1;padding:0 30px 22px}
.acc-line{height:14px;border-radius:7px;background:#eef1f6;margin-top:14px}
.acc-line.w1{width:92%}.acc-line.w2{width:78%}.acc-line.w3{width:60%}

/* tabs + buttons row */
.tabs{display:flex;align-items:center;position:relative}
.tab{display:flex;align-items:center;justify-content:center;height:58.827px;padding:0 29.414px}
.tab .label{font-size:25.74px}
.tab-underline{position:absolute;bottom:0;left:0;height:3.677px;background:var(--ink);border-radius:2px;
  transition:transform .4s var(--e-io),width .4s var(--e-io);transform-origin:left}
.btns{display:flex;align-items:center;gap:20px}
.btn{height:60px;padding:0 25px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:transform .12s var(--e-out),filter .18s var(--e-out)}
.btn .t{font-weight:500;font-size:24px;line-height:29px;color:var(--surface);white-space:nowrap;position:relative;z-index:2}
.btn.blue{background:var(--blue)} .btn.red{background:var(--red)}
.btn.hot{filter:brightness(1.06)} .btn.press{transform:scale(.955)}
.btn .ripple{position:absolute;left:50%;top:50%;width:12px;height:12px;border-radius:999px;
  background:rgba(255,255,255,.55);transform:translate(-50%,-50%) scale(0);opacity:0;z-index:1}
.btn .ripple.go{animation:rip .55s var(--e-out) forwards}
@keyframes rip{0%{transform:translate(-50%,-50%) scale(0);opacity:.55}100%{transform:translate(-50%,-50%) scale(16);opacity:0}}

/* toast */
.toast{background:var(--toast);height:77.96px;border-radius:10.631px;display:flex;align-items:center;
  justify-content:space-between;padding:21.262px 14.175px 21.262px 28.349px;width:100%;
  transition:transform .5s var(--e-out),opacity .5s var(--e-out)}
.toast.out{transform:translateX(46px);opacity:0}
.toast-left{display:flex;align-items:center;gap:15.223px}
.toast-txt{font-weight:400;font-size:25px;line-height:35.436px;color:var(--surface);white-space:nowrap}
.toast-close{width:28.349px;height:28.349px;display:flex;align-items:center;justify-content:center;border-radius:7.087px;
  transition:background .18s var(--e-out)} .toast-close.hot{background:rgba(255,255,255,.12)}

/* pagination */
.pg{display:flex;align-items:center;justify-content:space-between;width:100%}
.pg-item{width:57.333px;height:57.333px;border-radius:10.75px;display:flex;align-items:center;justify-content:center;
  font-weight:400;font-size:25.08px;line-height:35.833px;color:var(--ink);
  background:transparent;box-shadow:inset 0 0 0 0 var(--ink);transition:box-shadow .3s var(--e-out),background .3s var(--e-out)}
.pg-item.on{background:var(--surface);box-shadow:inset 0 0 0 1.792px var(--ink)}
.pg-arrow{width:57.333px;height:57.333px;display:flex;align-items:center;justify-content:center;border-radius:7.167px;
  transition:background .18s var(--e-out)} .pg-arrow.hot{background:#eef1f6}

/* ===== presence cursors ===== */
.cur{position:absolute;left:0;top:0;z-index:60;pointer-events:none;will-change:transform;
  transition:transform .62s var(--e-io)}
.cur svg{display:block;width:36px;height:36px;filter:drop-shadow(0 3px 7px rgba(16,24,40,.28));transition:transform .12s var(--e-out)}
.cur.press svg{transform:scale(.86)}
.cur .tag{position:absolute;left:25px;top:26px;height:28px;display:flex;align-items:center;padding:0 10px;
  border-radius:8px;font-size:16px;font-weight:600;line-height:1;color:#fff;white-space:nowrap;
  box-shadow:0 3px 8px rgba(16,24,40,.22)}
.cur.c1 .tag{background:var(--p1)} .cur.c2 .tag{background:var(--p2)} .cur.c3 .tag{background:var(--p3)}

@media (prefers-reduced-motion: reduce){
  .drift{animation:none}
  .cur{display:none}
}
</style></head>

   <!-- board lives outside drift so components never move -->
   <div class="board" id="board">

      <!-- 1. File Uploader / file item -->
      <div class="card">

        </div>
        <div class="pg-item" data-i="0">1</div>
        <div class="pg-item" data-i="1">2</div>
        <div class="pg-item" data-i="2">3</div>
        <div class="pg-item on" data-i="3">4</div>
        <div class="pg-item" data-i="4">5</div>
        <div class="pg-item" data-i="5">6</div>
        <div class="pg-item" data-i="6">7</div>
        <div class="pg-arrow" id="pgNext">
          <svg width="9.85" height="17.02" viewBox="0 0 9.85415 17.0208" fill="none">
            <path d="M1.34375 15.6771L8.5104 8.5104L1.34375 1.34375" stroke="#374151" stroke-width="2.6875" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

     </div><!-- /board -->

     <!-- cursors outside drift so positions align with static board -->
     <div class="cur c1" id="cur1">
       <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 2.5L5 19.5L9.4 15.3L12.1 21L14.7 19.8L12 14.2L18 14.2Z" fill="var(--p1)" stroke="#fefefe" stroke-width="1.4" stroke-linejoin="round"/></svg>
       <span class="tag">Maya</span>
     </div>
     <div class="cur c2" id="cur2">
       <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 2.5L5 19.5L9.4 15.3L12.1 21L14.7 19.8L12 14.2L18 14.2Z" fill="var(--p2)" stroke="#fefefe" stroke-width="1.4" stroke-linejoin="round"/></svg>
       <span class="tag">Leo</span>
     </div>
     <div class="cur c3" id="cur3">
       <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 2.5L5 19.5L9.4 15.3L12.1 21L14.7 19.8L12 14.2L18 14.2Z" fill="var(--p3)" stroke="#fefefe" stroke-width="1.4" stroke-linejoin="round"/></svg>
       <span class="tag">Ada</span>
     </div>

  </div><!-- /camera -->
 </div><!-- /scaler -->
</div><!-- /frame -->

<script>
const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const $ = id => document.getElementById(id);

const frame=document.querySelector('.frame'), scaler=$('scaler'),
      camera=$('camera'), app=$('app');

/* fit the 1280-wide stage into the responsive frame */
function fit(){ scaler.style.transform='scale('+(frame.clientWidth/1280)+')'; }
addEventListener('resize',fit); fit(); new ResizeObserver(fit).observe(frame);

/* measure an element's centre in scaler-space (1280x840) — scaler is stable, not affected by drift */
function pt(el,ox=0,oy=0){
  const a=scaler.getBoundingClientRect(), r=el.getBoundingClientRect();
  const k=a.width/1280;
  return { x:(r.left-a.left)/k + (r.width/k)/2 + ox,
           y:(r.top -a.top )/k + (r.height/k)/2 + oy };
}

/* ---- cursor object ---- */
const TIP={x:8,y:4};
function Cursor(id){
  const el=$(id);
  return {
    el,
    place(p){ el.style.transition='none'; el.style.transform=`translate(${p.x-TIP.x}px,${p.y-TIP.y}px)`;
              void el.offsetWidth; el.style.transition=''; },
    move(p,dur=640){ el.style.transitionDuration=(dur/1000)+'s';
              el.style.transform=`translate(${p.x-TIP.x}px,${p.y-TIP.y}px)`; return sleep(dur); },
    async press(target,cls){
      el.classList.add('press'); if(target) target.classList.add(cls||'press');
      await sleep(150); el.classList.remove('press');
      if(target) target.classList.remove(cls||'press'); await sleep(120);
    }
  };
}
const c1=Cursor('cur1'), c2=Cursor('cur2'), c3=Cursor('cur3');

/* targets */
const seg=[...document.querySelectorAll('#seg .seg-item')];
const tabs=[...document.querySelectorAll('#tabs .tab')];
const pgItems=[...document.querySelectorAll('#pg .pg-item')];
const tabUnderline=$('tabUnderline');

function setSeg(i){ seg.forEach((s,k)=>s.classList.toggle('on',k===i)); }
function setTab(i){
  const t=tabs[i];
  tabUnderline.style.width=t.offsetWidth+'px';
  tabUnderline.style.transform=`translateX(${t.offsetLeft}px)`;
}
function setPage(i){ pgItems.forEach((p,k)=>p.classList.toggle('on',k===i)); }
function ripple(btn){ const r=btn.querySelector('.ripple'); r.classList.remove('go'); void r.offsetWidth; r.classList.add('go'); }

function initState(){
  setSeg(0); setTab(0); setPage(3);
  $('radio').classList.add('on'); $('cbox').classList.add('on');
  $('acc').classList.remove('open'); $('toast').classList.remove('out');
}

/* ── home positions ── */
const HOME = {
  ada:  {x:1060, y:200},
  maya: {x:155,  y:340},
  leo:  {x:1024, y:460}
};

/* ── relay loop ──
   Ada  → checkbox (uncheck + recheck) → home   triggers Maya
   Maya → tab 2 (hover + click)        → home   triggers Leo
   Leo  → red button (hover + click)   → home   triggers Ada
*/
async function relay(){
  // place all cursors at home silently
  c1.place(HOME.maya);
  c2.place(HOME.leo);
  c3.place(HOME.ada);
  await sleep(600);

  while(true){

    /* ── ADA: checkbox ── */
    const cboxEl = $('cbox');
    await c3.move(pt(cboxEl), 700);
    await sleep(300);
    await c3.press(); cboxEl.classList.remove('on');   // uncheck
    await sleep(700);
    await c3.press(); cboxEl.classList.add('on');      // recheck
    await sleep(300);
    // Ada starts returning home — while she's on her way, Maya fires
    const adaReturn = c3.move(HOME.ada, 850);

    /* ── MAYA fires while Ada is returning ── */
    await sleep(200); // small stagger so overlap looks intentional
    const tab2Pt = pt(tabs[1]);
    await c1.move(tab2Pt, 700);
    tabs[1].classList.add('hover');
    await sleep(600);
    tabs[1].classList.remove('hover');
    await c1.press(); setTab(1);
    setTimeout(() => setTab(0), 2000);
    await sleep(200);
    // Maya starts returning home — while she's on her way, Leo fires
    const mayaReturn = c1.move(HOME.maya, 850);

    /* ── LEO fires while Maya is returning ── */
    await sleep(200);
    const redBtn = $('btnRed');
    await c2.move(pt(redBtn), 700);
    redBtn.classList.add('hover');
    await sleep(500);
    await c2.press(redBtn, 'press'); ripple(redBtn);
    redBtn.classList.remove('hover');
    await sleep(200);
    // Leo starts returning home — while he's on his way, Ada fires next cycle
    const leoReturn = c2.move(HOME.leo, 850);

    /* ── wait for all returns before Ada's next move ── */
    await Promise.all([adaReturn, mayaReturn, leoReturn]);
    await sleep(400);
  }
}

async function run(){
  await (document.fonts ? document.fonts.ready : Promise.resolve());
  await sleep(120); fit(); initState(); setTab(0);

  if(reduce){ setSeg(0); setTab(0); setPage(3); return; }

  camera.style.transition='none';
  camera.style.transform='translate(0px,0px) scale(1)';
  await sleep(200);

  relay();
}
run();
</script>
</body></html>
